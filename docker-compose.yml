version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: historagraph-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: historagraph

    ports:
      - "5432:5432"

    volumes:
      - ./database/postgres:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5

    container_name: historagraph-neo4j

    restart: always

    environment:
      NEO4J_AUTH: neo4j/password

    ports:
      - "7474:7474"
      - "7687:7687"

    volumes:
      - ./database/neo4j:/data

  qdrant:
    image: qdrant/qdrant

    container_name: historagraph-qdrant

    restart: always

    ports:
      - "6333:6333"

    volumes:
      - ./database/qdrant:/qdrant/storage