services:

  postgres:
    image: postgres:16

    container_name: historagraph-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: historagraph

    ports:
      - "5432:5432"

    volumes:
      - ./database/postgres:/var/lib/postgresql/data



  neo4j:
    image: neo4j:5

    container_name: historagraph-neo4j

    environment:
      NEO4J_AUTH: neo4j/historagraph123

    ports:
      - "7474:7474"
      - "7687:7687"

    volumes:
      - ./database/neo4j:/data



  qdrant:
    image: qdrant/qdrant

    container_name: historagraph-qdrant

    ports:
      - "6333:6333"

    volumes:
      - ./database/qdrant:/qdrant/storage



  backend:

    build:
      context: ./backend


    container_name: historagraph-backend


    ports:
      - "8000:8000"


    env_file:
      - ./backend/.env.docker


    depends_on:
      - postgres
      - neo4j
      - qdrant



  frontend:

    build:
      context: ./frontend


    container_name: historagraph-frontend


    ports:
      - "5173:5173"


    depends_on:
      - backend